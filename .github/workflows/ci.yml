name: NX Platform CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Validate Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show PowerShell Version
        shell: pwsh
        run: $PSVersionTable

      - name: Validate Repository Structure
        shell: pwsh
        run: ./.github/scripts/validate-repository.ps1

      - name: Validate NX Kernel
        shell: pwsh
        run: ./.github/scripts/validate-kernel.ps1